<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Funerals | Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #0f131d;
        --card: #171d2a;
        --border: rgba(199, 170, 107, 0.2);
        --text: #f0ece1;
        --muted: #a7acb9;
        --gold: #c7aa6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(199, 170, 107, 0.12), transparent 40%),
          linear-gradient(180deg, #0b0f18, var(--background));
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        width: min(100%, 620px);
        border: 1px solid var(--border);
        background: rgba(23, 29, 42, 0.86);
        padding: 32px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--gold);
        font-size: 12px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(2.4rem, 7vw, 3.7rem);
        font-weight: 500;
        line-height: 1.02;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        text-decoration: none;
      }

      .primary,
      .secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .primary {
        color: #10141c;
        background: linear-gradient(135deg, #8b6f2d, #c7aa6b, #dcc58c);
      }

      .secondary {
        color: var(--gold);
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Offline Fallback</p>
      <h1>Executive Funerals is still within reach.</h1>
      <p>
        Your connection appears to be unavailable right now. Core pages may still
        open from cache, and you can always use the direct contact options below
        for urgent assistance.
      </p>
      <div class="actions">
        <a class="primary" href="/">Try Homepage Again</a>
        <a class="secondary" href="tel:0715855360">Call 0715855360</a>
        <a class="secondary" href="https://wa.me/254715250625">WhatsApp Us</a>
      </div>
    </main>
  </body>
</html>
